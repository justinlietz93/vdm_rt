version: 0.1.0
status: active
layers:
  core:
    may_import:
      - vdm_rt.core
      - numpy
      - scipy
      - h5py
    must_not_import:
      - dash
      - flask
      - fastapi
      - vdm_rt.frontend
      - vdm_rt.io.visualization
      - matplotlib
  runtime:
    may_import:
      - vdm_rt.core
      - vdm_rt.runtime
      - vdm_rt.io
    must_not_author:
      - live prose
      - phrase completion
      - renderer repair
  control:
    may_do:
      - launch_runtime_process
      - stop_runtime_process
      - inspect_run_artifacts
    must_not_do:
      - mutate_core_state_directly
      - author_output
  frontend:
    status: removed
    rule: future frontend must be a client, not a runtime owner
runtime_identity:
  live_substrate:
    path: core/sparse_connectome.py
    symbol: SparseConnectome
  retained_core_systems:
    - core/adc.py
    - core/sie.py
    - core/sie_v2.py
    - core/neuroplasticity/
    - core/cortex/void_walkers/
    - core/cortex/maps/
  capability_closure_required:
    - core/growth_arbiter.py
    - core/structural_homeostasis.py
    - core/void_b1.py
    - core/neuroplasticity/
    - core/diagnostics.py
  forbidden_runtime_concepts:
    - dense substrate backend
    - torch or GPU runtime backend
    - frontend runtime owner
    - visualization or WebSocket map-stream runtime path
  archived_source_material:
    - docs/sources/legacy-substrate-neurogenesis/
  legacy_exception_pending_archive:
    - core/global_system.py
