version: 1
status: capability-closure-required
updated: 2026-06-26
scope: >
  Phase 0 classification of suspicious runtime surfaces in the independent
  vdm_rt reboot. This contract records the current disposition of code and
  capabilities; it does not itself move or delete source. Capability coverage
  is defined separately in runtime-capability-coverage.yml.

classification_values:
  keep: Live runtime code or an explicitly retained runtime boundary.
  port: A capability that remains required, but must be rederived in the live
    sparse/event-fed runtime rather than retaining its old implementation.
  archive: Source material that is not live runtime code and must leave the
    importable runtime tree before the cleanup phase closes.
  delete: A removed or forbidden runtime surface that must not reappear.

runtime_identity:
  live_substrate:
    path: core/sparse_connectome.py
    symbol: SparseConnectome
  retained_runtime_systems:
    - core/adc.py
    - core/sie.py
    - core/sie_v2.py
    - core/cortex/void_walkers/
    - core/cortex/maps/
    - core/bus.py
    - runtime/
    - io/logging/
    - control/
  forbidden_runtime_concepts:
    - dense substrate backend
    - torch or GPU runtime backend
    - frontend runtime owner
    - visualization or WebSocket map-stream runtime path
    - lexical, Markov, phrase-template, or macro output authorship
    - input-history-dependent output basis growth
    - release-time sentence composition

entries:
  - path: core/sparse_connectome.py
    class: keep
    state: live
    role: The sparse runtime substrate.
    evidence:
      - nexus.py constructs SparseConnectome for the runtime.
      - tests/core/test_active_graph_regression.py imports SparseConnectome.
    follow_up: Preserve as the sole runtime substrate; do not reintroduce dense selection.

  - path: core/adc.py
    class: keep
    state: live
    role: Current Active Domain Cartography implementation.
    evidence:
      - core/memory/engram_io.py restores ADC state through this module.
      - runtime cleanup and territory roadmaps name ADC as a retained runtime system.

  - path: core/sie.py
    class: keep
    state: live
    role: Runtime Self-Improvement Engine.
    evidence:
      - nexus.py imports and constructs SelfImprovementEngine.
    follow_up: Keep its runtime role distinct from the archived global_system SIE variant.

  - path: core/sie_v2.py
    class: keep
    state: live
    role: Intrinsic connectome SIE state and step rule.
    evidence:
      - core/sparse_connectome.py lazily constructs SIECfg and SIEState and invokes sie_step.

  - path: core/cortex/void_walkers/
    class: keep
    state: live
    role: Void-native bounded scout producers.
    evidence:
      - runtime/loop/main.py imports and instantiates scout implementations.
      - core/engine/core_engine.py imports the cold scout implementation.

  - path: core/cortex/maps/
    class: keep
    state: live
    role: Runtime map reducers and bounded map-head sources.
    evidence:
      - runtime cleanup policy retains maps as a core runtime system.
    follow_up: Protect with an importability guard before moving other code.

  - path: core/neuroplasticity/
    class: keep
    state: capability-closure-required
    role: Optional REVGSP and GDSP source pending a SparseConnectome-native adapter contract.
    evidence:
      - runtime/loop/main.py exposes optional adapter paths, but the default SparseConnectome does not satisfy their required substrate state.
    follow_up: See structural_plasticity_adapters in runtime-capability-coverage.yml before calling this live runtime behavior.

  - path: core/growth_arbiter.py
    class: port
    state: unwired
    role: Growth and cull decision source without a population-change executor.
    evidence:
      - No static runtime import was found.
      - SparseConnectome has no node append or retirement operation.
    follow_up: Retain as a source for the sparse_population_change port, not as a live owner.

  - path: core/structural_homeostasis.py
    class: port
    state: unwired_and_incompatible
    role: Intermediate structural repair implementation for the retired dense A/E interface.
    evidence:
      - No static runtime import was found.
      - SparseConnectome carries W and adjacency lists, not dense A/E matrices.
    follow_up: Keep sparse pruning/bridging obligations, not this interface.

  - path: core/void_b1.py
    class: keep
    state: unwired
    role: Sparse-capable topology packet producer.
    evidence:
      - No static runtime import was found.
      - The default runtime uses StreamingZEMA over complexity_cycles instead.
    follow_up: Resolve B1 ownership before removing its source or presenting config/b1.toml as active runtime control.

  - path: core/diagnostics.py
    class: port
    state: dense_interface_only
    role: Physics diagnostic source requiring a sparse readout decision.
    evidence:
      - No static runtime or test import was found.
      - The current entrypoints require dense A and optionally E.
    follow_up: Classify as external diagnostics or port its readout surface to SparseConnectome.

  - path: core/cortex/void_walkers/frontier_scout.py
    class: delete
    state: compatibility_decision_required
    role: Naming-only FrontierScout shim.
    evidence:
      - No static runtime import was found.
      - The runtime imports void_frontier_scout.FrontierScout directly.

  - path: io/cognition/composer.py
    class: delete
    state: live_prohibited_decoder
    role: N-gram, phrase-template, and keyword-fallback sentence author.
    evidence:
      - runtime/helpers/speak.py imports and invokes compose_say_text.
      - The source authority forbids lexical, Markov, template, and release-time authorship.
    follow_up: Remove with the live decoder callers; do not retain a compatibility import.

  - path: io/cognition/speaker.py
    class: delete
    state: live_prohibited_decoder
    role: Lexicon-IDF scoring for authored speech output.
    evidence:
      - runtime/helpers/speak.py imports novelty_and_score before emitting a say macro.
      - Output scoring over authored text is not actuator release.
    follow_up: Remove with runtime/helpers/speak.py and lexical runtime state.

  - path: io/lexicon/
    class: delete
    state: live_prohibited_decoder
    role: Persistent lexical counts and phrase-template source for output authorship.
    evidence:
      - nexus.py loads the phrase bank and lexicon on startup.
      - runtime/loop/main.py saves lexical state and runtime/helpers/speak.py updates it after output.
    follow_up: Delete the package and phrase bank after removing all live callers.

  - path: io/actuators/macros.py
    class: delete
    state: live_prohibited_decoder
    role: Macro-shaped text output emitter.
    evidence:
      - runtime/emitters.py constructs MacroEmitter.
      - runtime/helpers/smoke.py produces canned text macros through the emitter.
    follow_up: Remove with macro board, macro smoke output, and status macro emission.

  - path: io/actuators/thoughts.py
    class: delete
    state: diagnostic_scaffold_only
    role: Optional thought-event writer with no live producer beyond smoke material.
    evidence:
      - runtime/helpers/smoke.py is its only static method caller.
      - The source authority permits provenance logging but does not admit synthetic thought authorship.
    follow_up: Remove with runtime/emitters.py and thought smoke output.

  - path: io/cognition/stimulus.py
    class: port
    state: receptor_contract_violation
    role: Current text-to-connectome mapping.
    evidence:
      - The mapping skips repeated symbols before creating indices.
      - The source authority requires sequential, repetition-preserving receptor slices.
    follow_up: Replace with a bounded receptor-slice port; do not preserve the unique-symbol mapping.

  - path: io/ute.py
    class: port
    state: receptor_boundary_incomplete
    role: Current stdin and inbox intake boundary.
    evidence:
      - nexus.py constructs UTE and runtime/loop/main.py polls it.
      - Its synthetic wall-clock ticker and dashboard-inbox model are not the required medium-specific receptor contract.
    follow_up: Redefine as receptor transduction after decoder removal; retain no synthetic cognitive heartbeat.

  - path: io/utd.py
    class: port
    state: actuator_boundary_incomplete
    role: Current stdout/JSONL output sink with persistent macro board.
    evidence:
      - It auto-registers and persists macro names, and receives both input echoes and authored say output.
      - The source authority requires fixed actuator primitives and actuator events, not a text decoder.
    follow_up: Remove macro and input-echo behavior, then replace with an actuator-transducer contract.

  - path: io/logging/rolling_jsonl.py
    class: keep
    state: external_audit_logging
    role: Bounded external JSONL and zip-spool logging.
    evidence:
      - utils/logging_setup.py uses its logging handler.
      - It is not imported by core dynamics and does not feed runtime cognition.
    follow_up: Preserve the external-only boundary; do not use logs as receptor or reafference state.

  - path: docs/sources/legacy-substrate-neurogenesis/substrate.py
    former_runtime_path: core/substrate/substrate.py
    class: archive
    state: preserved_source_archive
    role: Legacy dense substrate with optional Torch/GPU backend.
    evidence:
      - Direct torch imports and a dense weight matrix are present in the source.
      - No direct or dynamic import reference was found while the source was under core/substrate/.
    destination: docs/sources/legacy-substrate-neurogenesis/substrate.py
    follow_up: Do not delete until node_field_and_spike_dynamics, intrinsic_plasticity, and synaptic_scaling are covered or intentionally retired.

  - path: docs/sources/legacy-substrate-neurogenesis/neurogenesis.py
    former_runtime_path: core/substrate/neurogenesis.py
    class: archive
    state: preserved_source_archive
    role: Legacy dense neuron-growth executor.
    evidence:
      - Imports torch and allocates a new N x N weight matrix during growth.
      - No direct or dynamic import reference was found while the source was under core/substrate/.
    destination: docs/sources/legacy-substrate-neurogenesis/neurogenesis.py
    follow_up: Do not delete until sparse_population_change is covered or intentionally retired.

  - path: docs/sources/legacy-substrate-neurogenesis/growth_arbiter.py
    former_runtime_path: core/substrate/growth_arbiter.py
    class: archive
    state: preserved_source_archive
    role: Legacy stability and debt-based growth decision source.
    evidence:
      - No direct or dynamic import reference was found while the source was under core/substrate/.
    destination: docs/sources/legacy-substrate-neurogenesis/growth_arbiter.py
    follow_up: Archive source; do not treat its thresholds or metric names as live policy.

  - path: docs/sources/legacy-substrate-neurogenesis/structural_homeostasis.py
    former_runtime_path: core/substrate/structural_homeostasis.py
    class: archive
    state: preserved_source_archive
    role: Legacy pruning and bridge-growth source.
    evidence:
      - No direct or dynamic import reference was found while the source was under core/substrate/.
    destination: docs/sources/legacy-substrate-neurogenesis/structural_homeostasis.py
    follow_up: Archive source; preserve pruning and bridge-repair obligations as ports.

  - path: capability:sparse_neurogenesis
    class: port
    state: planned
    source_paths:
      - docs/sources/legacy-substrate-neurogenesis/neurogenesis.py
      - docs/sources/legacy-substrate-neurogenesis/growth_arbiter.py
      - docs/sources/legacy-substrate-neurogenesis/structural_homeostasis.py
    target: core/neurogenesis/
    required_invariants:
      - Bounded dynamic population growth and culling.
      - Pressure, stability, and growth-debt based admission.
      - Sparse node and edge changes without dense N x N allocation.
      - Territory-safe seeding, pruning, and bridge repair.
      - Lifecycle events visible to the runtime event spine.
    roadmap: docs/roadmap/sparse-neurogenesis/TODO.md

  - path: core/global_system.py
    class: archive
    state: blocked_by_capability_closure
    role: Uncalled legacy ADC/SIE variant.
    evidence:
      - No direct or dynamic import reference was found outside this file.
      - It contains a scheduled one-dimensional k-means ADC and a second SIE implementation.
      - Live runtime roles are separately carried by core/adc.py, core/sie.py, and core/sie_v2.py.
    destination: docs/archive/runtime-reference/
    follow_up: Complete capability coverage for cartography and territory-conditioned valence before archival; do not port its scheduler or k-means mechanics by default.

  - path: frontend/
    class: delete
    state: absent_and_guarded
    role: Removed runtime owner.
    evidence:
      - tests/guards/test_no_frontend_package.py guards its absence.

  - path: io/visualization/
    class: delete
    state: absent_and_guarded
    role: Removed visualization runtime path.
    evidence:
      - tests/guards/test_runtime_engine_prune.py guards this path and related visualization helpers.

  - path: runtime/helpers/maps_ws.py
    class: delete
    state: absent_and_guarded
    role: Removed WebSocket map-stream helper.
    evidence:
      - tests/guards/test_runtime_engine_prune.py guards its absence.

review_notes:
  - path: docs/sources/legacy-substrate-neurogenesis/
    former_runtime_path: core/substrate/
    finding: Static reachability is empty, but prior boundary prose listed the package as retained.
    resolution: Source is preserved outside core/ while the sparse-native capability port remains open.
    required_before_move:
      - Add a no-torch live-runtime guard.
      - Add import checks for retained sparse runtime modules.

  - path: core/global_system.py
    finding: Static reachability is empty and the file carries its own legacy-classification TODO.
    resolution: Archive only after a bounded capability comparison with the live ADC/SIE paths.
    required_before_move:
      - Record which, if any, law-level invariant lacks a live owner.
      - Do not retain its scheduler or k-means implementation without a new runtime contract.
