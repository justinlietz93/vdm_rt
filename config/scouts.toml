rho_trail = 0.0
gamma_heat = 1.0
tau = 1.0

[scouts.weights.void_ray]
lambda_phi = 1.0
theta_mem = 0.0
tau = 1.0

[scouts.weights.memory_ray]
theta_mem = 0.8
tau = 1.0

[scouts.weights.frontier]
w_cold = 1.0
w_heat = 0.5
w_shared_neighbors = 0.25
w_degree = 0.5
tau = 1.0
