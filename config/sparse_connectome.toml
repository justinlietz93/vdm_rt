# Sparse connectome maintenance.

[sparse_connectome]
# Constructor defaults used when launching through the CLI.
threshold = 0.15
lambda_omega = 0.1
candidates = 64
traversal_walkers = 256
traversal_hops = 3
bundle_size = 3
prune_factor = 0.10

# Max symmetric bridge proposals per sparse maintenance pass.
bridge_budget = 24

# Minimum target-degree fraction for low-activity nodes.
min_k_frac = 0.5

# Budgeted active-fragment audit controls.
frag_audit_edges = 200000
frag_audit_every = 50
