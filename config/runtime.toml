# VDM RT runtime flow.
#
# Keep this file for cross-cutting tick-loop and event-spine switches. Put
# subsystem-specific knobs in their named TOML files.

[runtime]
# Raise selected fail-soft runtime exceptions during development.
strict = false

# 0 keeps CLI/logging cadence. Set a positive integer to override per-tick logs.
log_every_override = 0

# Fallback used only when a Nexus-like object does not expose dt.
default_dt_seconds = 0.1

[runtime.buffers]
ring_maxlen = 512
recent_why_maxlen = 256
recent_status_maxlen = 128
scout_stats_maxlen = 256
auditor_stats_maxlen = 128

[events]
# Event-driven reducer telemetry. This was previously enabled by default.
event_metrics = true

# Synthesize bounded delta-W events from current tick stimulation.
synth_delta_w = false

# Event metric sketch and detector defaults used when a caller omits them.
vt_width = 256
vt_depth = 3
vt_head_k = 256
b1_min_interval_ticks = 1
ewma_alpha = 0.05

# Generic topology-delta detector defaults used by StreamingZEMA when callers
# do not pass detector-specific overrides.
streaming_z_half_life_ticks = 50
streaming_z_spike = 3.0
streaming_z_hysteresis = 1.0
streaming_z_min_interval_ticks = 10

[territory]
# Head size for event-folded cohesion territories.
head_k = 512
