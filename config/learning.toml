# Optional plasticity/learning adapters.
#
# These adapters are disabled by default. They must stay explicit because they
# change runtime behavior beyond telemetry.

[learning.revgsp]
enabled = false
eta = 0.001
lambda_decay = 0.99
time_window_ms = 20
reward_sigmoid_scale = 1.5
max_pairs = 2048
sample_spikes_cap = 0
gamma_base_decay = 0.95
gamma_sensitivity = 0.1
temporal_filter_window = 5

[learning.revgsp.pi]
a_plus_base = 0.1
a_minus_base = 0.1
tau_plus_base = 20.0
tau_minus_base = 20.0

[learning.gdsp]
enabled = false
td_threshold = 0.2
territory_sample_k = 64
prune_ticks = 100
prune_threshold = 0.01
bridge_budget_nodes = 128
bridge_budget_pairs = 2048
rng_seed = 0
reward_threshold = 0.8
td_error_threshold = 0.5
novelty_threshold = 0.7
sustained_window_size = 10
history_maxlen = 100
min_reward_threshold = 0.3
max_reward_threshold = 0.9
min_td_threshold = 0.1
max_td_threshold = 0.8
min_novelty_threshold = 0.2
max_novelty_threshold = 0.9
stagnation_ticks = 500
stagnation_b1_threshold = 0.001
activity_high_count = 20
threshold_adapt_alpha = 0.05
